services:
  mariadb:
    image: mariadb:10.11
    container_name: ppgpt-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: ppgpt
      MARIADB_USER: ppgpt
      MARIADB_PASSWORD: ppgpt_password
    volumes:
      - ./data/mariadb:/var/lib/mysql
    networks:
      - ai-gateway-net
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: ppgpt-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./data/redis:/data
    networks:
      - ai-gateway-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ppgpt-backend
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # R2DBC URL must use container name "mariadb"
      DB_URL: r2dbc:mariadb://mariadb:3306/ppgpt
      DB_USER: ppgpt
      DB_PASS: ppgpt_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # 64-character hex string for AES-256 (used by CryptoService)
      # You can generate a new one via: openssl rand -hex 32
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    networks:
      - ai-gateway-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ppgpt-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      # For dev environment alternatives you could expose 3000 mapped to 80 like: "3000:80"
    networks:
      - ai-gateway-net

networks:
  ai-gateway-net:
    driver: bridge
